events {}

http {
  server {
    listen 80;

    location = /support {
      return 301 /support/;
    }

    location /support/ {
      proxy_pass http://beflex-support-frontend:80/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/beflex-support/ {
      rewrite ^/api/beflex-support/(.*)$ /api/$1 break;
      proxy_pass http://beflex-support-backend:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
