services:
  beflex-support-backend:
    image: reg.bcecm.com/support/beflex-support-backend:${BEFLEX_SUPPORT_BACKEND_TAG:-0.0.5}
    container_name: beflex-support-repo-backend
    restart: always
    mem_limit: ${MEM_LIMIT_BEFLEX_SUPPORT_BACKEND:-256}m
    environment:
      - TZ=Asia/Bangkok
      - PORT=3000
      - ALFRESCO_BASE_URL=${ALFRESCO_BASE_URL:-http://alfresco:8080}
      - PERMISSION_SERVICE_URL=${PERMISSION_SERVICE_URL:-http://permission-service/api/Excel/PostFile}
      - ALLOPS_REQUIRED_GROUP=GROUP_SUPPORT_WORKSPCE
      - ALLOPS_JWT_SECRET=${ALLOPS_JWT_SECRET}
      - ALLOPS_UPLOAD_DIR=/app/uploads
      - ALFRESCO_TIMEOUT_MS=10000
      - PERMISSION_TIMEOUT_MS=30000
      - PGHOST=${EXTENSION_DB_PGHOST}
      - PGPORT=${EXTENSION_DB_PGPORT}
      - PGDATABASE=${EXTENSION_DB_NAME}
      - PGUSER=${EXTENSION_DB_PGUSER}
      - PGPASSWORD=${EXTENSION_DB_PGPASSWORD}
      - CREDENTIAL_MANAGER_URL=${CREDENTIAL_MANAGER_URL:-http://credential-manager-backend:3900}
      - CREDENTIAL_MANAGER_TOKEN=${CREDENTIAL_MANAGER_BACKEND_STATIC_API_TOKEN}
    volumes:
      - ${DATA_VOLUME:-./data}/support-uploads:/app/uploads

  beflex-support-frontend:
    image: reg.bcecm.com/support/beflex-support-frontend:${BEFLEX_SUPPORT_FRONTEND_TAG:-0.0.5}
    container_name: beflex-support-repo-frontend
    restart: always
    mem_limit: ${MEM_LIMIT_BEFLEX_SUPPORT_FRONTEND:-128}m
    environment:
      - TZ=Asia/Bangkok
    depends_on:
      - beflex-support-backend

  beflex-support-proxy:
    image: nginx:${NGINX_TAG:-1.25.4}
    container_name: beflex-support-repo-proxy
    restart: always
    depends_on:
      - beflex-support-frontend
      - beflex-support-backend
    ports:
      - "8088:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
